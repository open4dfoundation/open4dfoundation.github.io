<svg viewBox="0 0 960 220" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- stages -->
  <g text-anchor="middle">
    <!-- Capture -->
    <rect x="20" y="60" width="150" height="100" rx="14" fill="rgba(99,102,241,0.10)" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="95" cy="95" r="16" fill="none" stroke="#a5b4fc" stroke-width="2"/>
    <circle cx="95" cy="95" r="6" fill="#a5b4fc"/>
    <text x="95" y="140" fill="#e6ecf5" font-size="15" font-weight="600">Capture</text>

    <!-- Encode -->
    <rect x="215" y="60" width="150" height="100" rx="14" fill="rgba(139,92,246,0.10)" stroke="#8b5cf6" stroke-width="1.5"/>
    <g stroke="#c4b5fd" stroke-width="2" fill="none">
      <path d="M270 85 h40 M270 95 h28 M270 105 h34"/>
    </g>
    <text x="290" y="140" fill="#e6ecf5" font-size="15" font-weight="600">Encode</text>
    <text x="290" y="180" fill="#64748b" font-size="12">N4MC · TSMC · TVMC</text>

    <!-- Stream -->
    <rect x="410" y="60" width="150" height="100" rx="14" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="1.5"/>
    <g stroke="#67e8f9" stroke-width="2" fill="none">
      <path d="M455 95 q10 -14 20 0 t20 0"/>
      <path d="M455 108 q10 -14 20 0 t20 0" opacity="0.5"/>
    </g>
    <text x="485" y="140" fill="#e6ecf5" font-size="15" font-weight="600">Stream</text>
    <text x="485" y="180" fill="#64748b" font-size="12">bitrate · latency budgets</text>

    <!-- Decode -->
    <rect x="605" y="60" width="150" height="100" rx="14" fill="rgba(139,92,246,0.10)" stroke="#8b5cf6" stroke-width="1.5"/>
    <g stroke="#c4b5fd" stroke-width="2" fill="none">
      <rect x="660" y="82" width="40" height="26" rx="4"/>
      <path d="M668 95 l8 -8 8 8 8 -8"/>
    </g>
    <text x="680" y="140" fill="#e6ecf5" font-size="15" font-weight="600">Decode</text>
    <text x="680" y="180" fill="#64748b" font-size="12">Unity plugin · Python player</text>

    <!-- Render -->
    <rect x="800" y="60" width="140" height="100" rx="14" fill="rgba(99,102,241,0.10)" stroke="url(#pg)" stroke-width="1.8"/>
    <g stroke="#a5b4fc" stroke-width="2" fill="none">
      <path d="M850 84 a20 12 0 0 1 40 0 v10 a20 12 0 0 1 -40 0 z" transform="translate(-20,0)"/>
      <circle cx="860" cy="92" r="4" fill="#22d3ee" stroke="none"/>
      <circle cx="880" cy="92" r="4" fill="#22d3ee" stroke="none"/>
    </g>
    <text x="870" y="140" fill="#e6ecf5" font-size="15" font-weight="600">Render (XR)</text>
    <text x="870" y="180" fill="#64748b" font-size="12">Meta Quest 3</text>
  </g>

  <!-- arrows -->
  <g stroke="#64748b" stroke-width="2" marker-end="url(#arrow)">
    <line x1="172" y1="110" x2="211" y2="110"/>
    <line x1="367" y1="110" x2="406" y2="110"/>
    <line x1="562" y1="110" x2="601" y2="110"/>
    <line x1="757" y1="110" x2="796" y2="110"/>
  </g>

  <text x="480" y="34" text-anchor="middle" fill="#94a3b8" font-size="14" letter-spacing="2">END-TO-END 4D PIPELINE</text>
</svg>

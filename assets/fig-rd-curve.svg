<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- title -->
  <text x="90" y="28" fill="#e6ecf5" font-size="15" font-weight="600">Rate–distortion: quality vs. bitrate</text>
  <text x="90" y="46" fill="#64748b" font-size="12">Illustrative curves — not measured results</text>

  <!-- gridlines (recessive) -->
  <g stroke="rgba(148,163,184,0.12)" stroke-width="1">
    <line x1="90" y1="325" x2="670" y2="325"/>
    <line x1="90" y1="270" x2="670" y2="270"/>
    <line x1="90" y1="215" x2="670" y2="215"/>
    <line x1="90" y1="160" x2="670" y2="160"/>
    <line x1="90" y1="105" x2="670" y2="105"/>
  </g>
  <!-- axes -->
  <line x1="90" y1="380" x2="670" y2="380" stroke="rgba(148,163,184,0.35)" stroke-width="1"/>

  <!-- y tick labels -->
  <g fill="#94a3b8" font-size="11" text-anchor="end">
    <text x="82" y="384">50</text>
    <text x="82" y="329">55</text>
    <text x="82" y="274">60</text>
    <text x="82" y="219">65</text>
    <text x="82" y="164">70</text>
    <text x="82" y="109">75</text>
  </g>
  <text x="24" y="240" fill="#94a3b8" font-size="12" transform="rotate(-90 24 240)" text-anchor="middle">Geometry PSNR (dB)</text>

  <!-- x tick labels -->
  <g fill="#94a3b8" font-size="11" text-anchor="middle">
    <text x="90" y="400">0</text>
    <text x="172.9" y="400">10</text>
    <text x="255.7" y="400">20</text>
    <text x="338.6" y="400">30</text>
    <text x="421.4" y="400">40</text>
    <text x="504.3" y="400">50</text>
    <text x="587.1" y="400">60</text>
    <text x="670" y="400">70</text>
  </g>
  <text x="380" y="428" fill="#94a3b8" font-size="12" text-anchor="middle">Bitrate (Mbps)</text>

  <!-- series: N4MC -->
  <path d="M131.4 248 L172.9 204 L255.7 165.5 L421.4 138 L587.1 121.5" fill="none" stroke="#6366f1" stroke-width="2"/>
  <g fill="#6366f1" stroke="#0d1322" stroke-width="2">
    <circle cx="131.4" cy="248" r="4.5"/><circle cx="172.9" cy="204" r="4.5"/><circle cx="255.7" cy="165.5" r="4.5"/><circle cx="421.4" cy="138" r="4.5"/><circle cx="587.1" cy="121.5" r="4.5"/>
  </g>
  <text x="600" y="116" fill="#e6ecf5" font-size="12" font-weight="600">N4MC</text>

  <!-- series: TVMC -->
  <path d="M131.4 286.5 L172.9 242.5 L255.7 204 L421.4 171 L587.1 154.5" fill="none" stroke="#0891b2" stroke-width="2"/>
  <g fill="#0891b2" stroke="#0d1322" stroke-width="2">
    <circle cx="131.4" cy="286.5" r="4.5"/><circle cx="172.9" cy="242.5" r="4.5"/><circle cx="255.7" cy="204" r="4.5"/><circle cx="421.4" cy="171" r="4.5"/><circle cx="587.1" cy="154.5" r="4.5"/>
  </g>
  <text x="600" y="152" fill="#e6ecf5" font-size="12" font-weight="600">TVMC</text>

  <!-- series: per-frame Draco baseline -->
  <path d="M131.4 336 L172.9 292 L255.7 253.5 L421.4 220.5 L587.1 204" fill="none" stroke="#d97706" stroke-width="2"/>
  <g fill="#d97706" stroke="#0d1322" stroke-width="2">
    <circle cx="131.4" cy="336" r="4.5"/><circle cx="172.9" cy="292" r="4.5"/><circle cx="255.7" cy="253.5" r="4.5"/><circle cx="421.4" cy="220.5" r="4.5"/><circle cx="587.1" cy="204" r="4.5"/>
  </g>
  <text x="600" y="204" fill="#e6ecf5" font-size="12" font-weight="600">Per-frame</text>

  <!-- legend -->
  <g font-size="12" fill="#94a3b8">
    <circle cx="452" cy="24" r="5" fill="#6366f1"/><text x="463" y="28">N4MC</text>
    <circle cx="524" cy="24" r="5" fill="#0891b2"/><text x="535" y="28">TVMC</text>
    <circle cx="596" cy="24" r="5" fill="#d97706"/><text x="607" y="28">Per-frame</text>
  </g>
</svg>

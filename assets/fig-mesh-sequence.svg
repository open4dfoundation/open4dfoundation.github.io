<svg viewBox="0 0 960 300" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="tarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="url(#mg)"/>
    </marker>
  </defs>

  <text x="480" y="34" text-anchor="middle" fill="#94a3b8" font-size="14" letter-spacing="2">TIME-VARYING MESH SEQUENCE</text>

  <!-- frame 1: sphere-ish blob -->
  <g transform="translate(120,140)" stroke="#a5b4fc" stroke-width="1.4" fill="rgba(99,102,241,0.08)">
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26"/>
    <line x1="0" y1="-52" x2="0" y2="52"/>
    <line x1="-45" y1="-26" x2="45" y2="26"/>
    <line x1="45" y1="-26" x2="-45" y2="26"/>
    <line x1="-45" y1="-26" x2="0" y2="52" opacity="0.5"/>
    <line x1="45" y1="-26" x2="0" y2="52" opacity="0.5"/>
    <line x1="0" y1="-52" x2="-45" y2="26" opacity="0.5"/>
    <line x1="0" y1="-52" x2="45" y2="26" opacity="0.5"/>
  </g>
  <text x="120" y="230" text-anchor="middle" fill="#e6ecf5" font-size="13" font-weight="600">t = 0</text>
  <text x="120" y="250" text-anchor="middle" fill="#64748b" font-size="11">8,204 vertices</text>

  <!-- frame 2: deforming -->
  <g transform="translate(340,140)" stroke="#9caefc" stroke-width="1.4" fill="rgba(120,120,246,0.08)">
    <polygon points="6,-56 48,-20 40,30 -4,54 -48,22 -42,-30"/>
    <line x1="6" y1="-56" x2="-4" y2="54"/>
    <line x1="-42" y1="-30" x2="40" y2="30"/>
    <line x1="48" y1="-20" x2="-48" y2="22"/>
    <line x1="-42" y1="-30" x2="-4" y2="54" opacity="0.5"/>
    <line x1="48" y1="-20" x2="-4" y2="54" opacity="0.5"/>
    <line x1="6" y1="-56" x2="-48" y2="22" opacity="0.5"/>
    <line x1="6" y1="-56" x2="40" y2="30" opacity="0.5"/>
  </g>
  <text x="340" y="230" text-anchor="middle" fill="#e6ecf5" font-size="13" font-weight="600">t = 1</text>
  <text x="340" y="250" text-anchor="middle" fill="#64748b" font-size="11">8,731 vertices</text>

  <!-- frame 3: more deformed -->
  <g transform="translate(560,140)" stroke="#7dd0f0" stroke-width="1.4" fill="rgba(60,180,238,0.08)">
    <polygon points="14,-54 52,-8 34,40 -14,52 -52,12 -34,-40"/>
    <line x1="14" y1="-54" x2="-14" y2="52"/>
    <line x1="-34" y1="-40" x2="34" y2="40"/>
    <line x1="52" y1="-8" x2="-52" y2="12"/>
    <line x1="-34" y1="-40" x2="-14" y2="52" opacity="0.5"/>
    <line x1="52" y1="-8" x2="-14" y2="52" opacity="0.5"/>
    <line x1="14" y1="-54" x2="-52" y2="12" opacity="0.5"/>
    <line x1="14" y1="-54" x2="34" y2="40" opacity="0.5"/>
  </g>
  <text x="560" y="230" text-anchor="middle" fill="#e6ecf5" font-size="13" font-weight="600">t = 2</text>
  <text x="560" y="250" text-anchor="middle" fill="#64748b" font-size="11">9,146 vertices</text>

  <!-- frame 4 -->
  <g transform="translate(780,140)" stroke="#67e8f9" stroke-width="1.4" fill="rgba(34,211,238,0.08)">
    <polygon points="20,-50 54,4 26,46 -22,50 -54,2 -26,-46"/>
    <line x1="20" y1="-50" x2="-22" y2="50"/>
    <line x1="-26" y1="-46" x2="26" y2="46"/>
    <line x1="54" y1="4" x2="-54" y2="2"/>
    <line x1="-26" y1="-46" x2="-22" y2="50" opacity="0.5"/>
    <line x1="54" y1="4" x2="-22" y2="50" opacity="0.5"/>
    <line x1="20" y1="-50" x2="-54" y2="2" opacity="0.5"/>
    <line x1="20" y1="-50" x2="26" y2="46" opacity="0.5"/>
  </g>
  <text x="780" y="230" text-anchor="middle" fill="#e6ecf5" font-size="13" font-weight="600">t = 3</text>
  <text x="780" y="250" text-anchor="middle" fill="#64748b" font-size="11">9,018 vertices</text>

  <!-- correspondence dashes -->
  <g stroke="#475569" stroke-width="1.2" stroke-dasharray="5 6">
    <line x1="176" y1="132" x2="284" y2="132"/>
    <line x1="396" y1="132" x2="504" y2="132"/>
    <line x1="616" y1="132" x2="724" y2="132"/>
  </g>

  <!-- time axis -->
  <line x1="60" y1="278" x2="890" y2="278" stroke="url(#mg)" stroke-width="2.5" marker-end="url(#tarrow)"/>
  <text x="906" y="283" fill="#67e8f9" font-size="14" font-style="italic">t</text>
</svg>

<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- title -->
  <text x="40" y="28" fill="#e6ecf5" font-size="15" font-weight="600">Per-frame decode latency</text>
  <text x="40" y="46" fill="#64748b" font-size="12">Illustrative values — not measured results · lower is better</text>

  <!-- gridlines -->
  <g stroke="rgba(148,163,184,0.12)" stroke-width="1">
    <line x1="266" y1="66" x2="266" y2="272"/>
    <line x1="392" y1="66" x2="392" y2="272"/>
    <line x1="518" y1="66" x2="518" y2="272"/>
    <line x1="644" y1="66" x2="644" y2="272"/>
  </g>
  <!-- baseline -->
  <line x1="140" y1="66" x2="140" y2="272" stroke="rgba(148,163,184,0.35)" stroke-width="1"/>

  <!-- x tick labels -->
  <g fill="#94a3b8" font-size="11" text-anchor="middle">
    <text x="140" y="292">0</text>
    <text x="266" y="292">10</text>
    <text x="392" y="292">20</text>
    <text x="518" y="292">30</text>
    <text x="644" y="292">40</text>
  </g>
  <text x="392" y="320" fill="#94a3b8" font-size="12" text-anchor="middle">Decode time per frame (ms)</text>

  <!-- bars: 4px rounded data-end, anchored square at baseline -->
  <g fill="#6366f1">
    <path d="M140 76 h101.4 a4 4 0 0 1 4 4 v24 a4 4 0 0 1 -4 4 H140 z"/>
    <path d="M140 128 h164.4 a4 4 0 0 1 4 4 v24 a4 4 0 0 1 -4 4 H140 z"/>
    <path d="M140 180 h214.8 a4 4 0 0 1 4 4 v24 a4 4 0 0 1 -4 4 H140 z"/>
    <path d="M140 232 h340.8 a4 4 0 0 1 4 4 v24 a4 4 0 0 1 -4 4 H140 z"/>
  </g>

  <!-- category labels -->
  <g fill="#e6ecf5" font-size="13" text-anchor="end">
    <text x="128" y="97">N4MC</text>
    <text x="128" y="149">TSMC</text>
    <text x="128" y="201">TVMC</text>
    <text x="128" y="253">Per-frame</text>
  </g>

  <!-- value labels -->
  <g fill="#94a3b8" font-size="12">
    <text x="253" y="97">8.4 ms</text>
    <text x="316" y="149">13.4 ms</text>
    <text x="367" y="201">17.4 ms</text>
    <text x="493" y="253">27.4 ms</text>
  </g>
</svg>
